name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          
      - run: cargo install wasm-pack
      
      - run: |
            wasm-pack build --release --target web --out-name wasm --out-dir ./docs/pkg
            cp index.html app.js ./docs/
            cp static/styles.css ./docs/static/ -r 2>/dev/null || mkdir -p ./docs/static && cp static/styles.css ./docs/static/
            cp _data/boundingBoxes.json ./docs/
      
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs